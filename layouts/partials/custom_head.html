<style>
:root {
  --width: 720px;
  --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, Roboto, Helvetica, Arial, sans-serif;
  --font-secondary: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, Roboto, Helvetica, Arial, sans-serif;
  --font-scale: 1.05em;
  --background-color: #faf9f6;
  --heading-color: #1a1a1a;
  --text-color: #2b2b2b;
  --link-color: #2557d6;
  --visited-color: #6d54b5;
  --blockquote-color: #555;
  --accent: #2557d6;
  --code-bg: #f0eee8;
  --border: #e4e0d6;
}
@media (prefers-color-scheme: dark) {
  :root {
    --background-color: #14171a;
    --heading-color: #f1f1f1;
    --text-color: #d7d7d7;
    --link-color: #7fb4ff;
    --visited-color: #b9a6e6;
    --blockquote-color: #b6b6b6;
    --accent: #7fb4ff;
    --code-bg: #20242a;
    --border: #2c3138;
  }
}

body {
  line-height: 1.7;
  background: var(--background-color);
  color: var(--text-color);
}

h1, h2, h3 { color: var(--heading-color); line-height: 1.25; font-weight: 700; }
h1 { font-size: 1.9em; margin-top: 0.2em; }
h2 { font-size: 1.4em; margin-top: 2em; }
h3 { font-size: 1.15em; margin-top: 1.6em; }

p, li { font-size: 1.02em; }

a { color: var(--link-color); text-decoration: none; border-bottom: 1px solid transparent; }
a:hover { border-bottom-color: var(--link-color); }

hr { border: none; border-top: 1px solid var(--border); margin: 2.4em 0; }

code {
  background: var(--code-bg);
  padding: 0.12em 0.36em;
  border-radius: 4px;
  font-size: 0.9em;
  font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
}

pre {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1em 1.1em;
  overflow-x: auto;
  line-height: 1.5;
}
pre code { background: none; padding: 0; font-size: 0.88em; }

table { border-collapse: collapse; width: 100%; margin: 1.5em 0; font-size: 0.96em; }
th, td { border: 1px solid var(--border); padding: 0.5em 0.8em; text-align: left; }
thead th { background: var(--code-bg); }

blockquote {
  border-left: 3px solid var(--accent);
  margin: 1.5em 0;
  padding: 0.4em 0 0.4em 1.1em;
  color: var(--blockquote-color);
  font-style: italic;
}

nav a { margin-right: 1em; }
</style>
